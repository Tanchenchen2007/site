<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小汽车行驶动画 - 从右到左</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow-x: hidden; /* 防止横向滚动条 */
            overflow-y: hidden; /* 防止纵向滚动条 */
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(245, 245, 245, 0.9) 0%,
                rgba(240, 240, 240, 0.8) 30%,
                rgba(235, 235, 235, 0.7) 100%
            ); /* 简约渐变背景，与汽车图片融合 */
            font-family: Arial, sans-serif;
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        
        /* 路面效果 - 简约版 */
        .road {
            position: absolute;
            bottom: 25%; /* 调整道路位置 */
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(100, 100, 100, 0.3) 20%,
                rgba(100, 100, 100, 0.6) 50%,
                rgba(100, 100, 100, 0.3) 80%,
                transparent 100%
            ); /* 简约的路面线条 */
        }
        
        .road::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                #fff 20%,
                #fff 30%,
                transparent 40%,
                transparent 60%,
                #fff 70%,
                #fff 80%,
                transparent 100%
            ); /* 简约的道路虚线 */
        }
        
        /* 汽车容器 - 从右到左 */
        .car-container {
            position: absolute;
            bottom: calc(25% + 10px); /* 汽车在道路上方 */
            right: -100px; /* 初始位置在屏幕外右侧 */
            width: 120px; /* 稍大一点的汽车 */
            animation: drive 7s linear infinite;
            z-index: 10;
        }
        
        .car {
            width: 100%;
            height: auto;
            filter: 
                drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.2)) /* 阴影效果 */
                contrast(1.05) /* 增强对比度 */
                brightness(1.05); /* 轻微提亮 */
            transform: scaleX(-1); /* 水平翻转，使车头朝左 */
        }
        
        /* 从右到左的行驶动画 */
        @keyframes drive {
            0% {
                right: -100px; /* 从右侧屏幕外开始 */
                transform: scaleX(-1) translateY(0);
            }
            10% {
                transform: scaleX(-1) translateY(-2px); /* 轻微弹跳效果 */
            }
            20% {
                transform: scaleX(-1) translateY(0);
            }
            30% {
                transform: scaleX(-1) translateY(-1px);
            }
            50% {
                transform: scaleX(-1) translateY(0);
            }
            100% {
                right: 100%; /* 移动到左侧屏幕外 */
                transform: scaleX(-1) translateY(0);
            }
        }
        
        /* 简约的浮动元素增强逼真感 */
        .floating-element {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(2px);
        }
        
        .element1 {
            width: 150px;
            height: 150px;
            top: 20%;
            right: 10%;
            animation: float 20s infinite ease-in-out;
        }
        
        .element2 {
            width: 100px;
            height: 100px;
            bottom: 30%;
            left: 15%;
            animation: float 15s infinite ease-in-out reverse;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(20px, 10px) rotate(5deg);
            }
            50% {
                transform: translate(10px, 20px) rotate(0deg);
            }
            75% {
                transform: translate(-10px, 10px) rotate(-5deg);
            }
        }
        
        /* 标题样式 */
        .title {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: 300;
            color: rgba(60, 60, 60, 0.8);
            letter-spacing: 2px;
            z-index: 5;
        }
        
        /* 信息提示 */
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(100, 100, 100, 0.6);
            z-index: 5;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .car-container {
                width: 100px;
                bottom: calc(25% + 5px);
            }
            
            .title {
                font-size: 20px;
                top: 15px;
            }
        }
        
        /* 添加微妙的背景纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <h1 class="title">汽车从右到左行驶动画</h1>
    
    <!-- 简约的浮动装饰元素 -->
    <div class="floating-element element1"></div>
    <div class="floating-element element2"></div>
    
    <!-- 简约的路面线条 -->
    <div class="road"></div>
    
    <!-- 汽车容器 - 从右到左 -->
    <div class="car-container">
        < img 
            src="https://images.unsplash.com/photo-1739613564795-0bbcda47401b?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
            alt="从右向左行驶的小汽车" 
            class="car"
        >
    </div>
    
    <div class="info">汽车从右侧驶入，从左侧驶出，无限循环</div>
    
    <script>
        // 可选：添加汽车经过时的声音效果提示
        document.querySelector('.car-container').addEventListener('animationiteration', function() {
            console.log('汽车完成一次循环行驶');
        });
        
        // 页面加载完成提示
        window.addEventListener('load', function() {
            console.log('汽车从右到左行驶动画已加载');
        });
    </script>
</body>
</html>
